name: Build and Deploy to Public Repo

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-public-site
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build Project
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Public Repo
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/kiniv-21/trios-data.git public-repo
          find public-repo -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. public-repo/
          cd public-repo
          git remote set-url origin https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/kiniv-21/trios-data.git
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add --all

          if git diff --cached --quiet; then
            echo "No deployment changes to publish."
            exit 0
          fi

          git commit -m "Deploy from private repo"
          git push origin main